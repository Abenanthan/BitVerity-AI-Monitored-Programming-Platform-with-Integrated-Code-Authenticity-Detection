services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: codeverify_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB:       codeverify
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: codeverify_redis
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── Node.js API ─────────────────────────────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: codeverify_api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV:                development
      PORT:                    5000
      DATABASE_URL:            postgresql://postgres:password@postgres:5432/codeverify?schema=public
      REDIS_URL:               redis://redis:6379
      JWT_ACCESS_SECRET:       ${JWT_ACCESS_SECRET:-changeme_access_secret}
      JWT_REFRESH_SECRET:      ${JWT_REFRESH_SECRET:-changeme_refresh_secret}
      JWT_ACCESS_EXPIRES_IN:   15m
      JWT_REFRESH_EXPIRES_IN:  7d
      GITHUB_CLIENT_ID:        ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET:    ${GITHUB_CLIENT_SECRET:-}
      GITHUB_CALLBACK_URL:     http://localhost:5000/api/auth/github/callback
      JUDGE0_API_URL:          https://judge0-ce.p.rapidapi.com
      JUDGE0_API_KEY:          ${JUDGE0_API_KEY:-}
      DETECTION_SERVICE_URL:   http://detection:8000
      FRONTEND_URL:            http://localhost:5173
      SUBMIT_RATE_LIMIT:       5
      SUBMIT_RATE_WINDOW:      60
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/app
      - /app/node_modules
    command: >
      sh -c "npx prisma migrate deploy && node src/index.js"

  # ── Python Detection Microservice ────────────────────────────────────────────
  detection:
    build:
      context: ./detection-service
      dockerfile: Dockerfile
    container_name: codeverify_detection
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL:     postgresql+psycopg2://postgres:password@postgres:5432/codeverify
      REDIS_URL:        redis://redis:6379
      CODEBERT_MODEL:   microsoft/codebert-base
      PORT:             8000
      ENV:              development
      WEIGHT_BEHAVIORAL:     0.30
      WEIGHT_CODE_PATTERN:   0.35
      WEIGHT_FINGERPRINT:    0.25
      WEIGHT_EXPLAINABILITY: 0.10
      THRESHOLD_AI:          0.75
      THRESHOLD_SUSPICIOUS:  0.45
    ports:
      - "8000:8000"
    volumes:
      - ./detection-service:/app
      - detection_model_cache:/root/.cache/huggingface
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data:
  redis_data:
  detection_model_cache:
